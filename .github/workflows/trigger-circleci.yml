name: Trigger CircleCI Pipelines
permissions:
  contents: read
on:
  push:
    branches: [master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1)

          RUN_PHP=false
          if echo "$CHANGED" | grep -qv "^admin/"; then
            RUN_PHP=true
          fi
          echo "run_php=$RUN_PHP" >> $GITHUB_OUTPUT

          PERF_DIRS="core graphql jsonapi mcp search theme"
          RUN_PERF=false
          for dir in $PERF_DIRS; do
            if echo "$CHANGED" | grep -q "^${dir}/"; then
              RUN_PERF=true
              break
            fi
          done
          echo "run_perf=$RUN_PERF" >> $GITHUB_OUTPUT

          RUN_ADMIN=false
          if echo "$CHANGED" | grep -q "^admin/"; then
            RUN_ADMIN=true
          fi
          echo "run_admin=$RUN_ADMIN" >> $GITHUB_OUTPUT

      - name: Trigger CircleCI PHP pipeline
        if: steps.check.outputs.run_php == 'true'
        run: |
          PARAMS='{"run_php": true}'
          if [ "$RUN_PERF" = "true" ]; then
            PARAMS='{"run_php": true, "run_perf": true}'
          fi
          curl -s -X POST \
            "https://circleci.com/api/v2/project/gh/aimeos/pagible/pipeline" \
            -H "Circle-Token: $CCI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": \"master\", \"parameters\": $PARAMS}"
        env:
          CCI_TOKEN: ${{ secrets.CCI_TOKEN }}
          RUN_PERF: ${{ steps.check.outputs.run_perf }}

      - name: Trigger CircleCI admin pipeline
        if: steps.check.outputs.run_admin == 'true'
        run: |
          curl -s -X POST \
            "https://circleci.com/api/v2/project/gh/aimeos/pagible/pipeline" \
            -H "Circle-Token: $CCI_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "master", "parameters": {"run_admin": true}}'
        env:
          CCI_TOKEN: ${{ secrets.CCI_TOKEN }}
