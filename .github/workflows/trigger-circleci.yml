name: Trigger Performance Tests
permissions:
  contents: read
on:
  push:
    branches: [master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if perf-relevant packages changed
        id: check
        run: |
          PERF_DIRS="core graphql jsonapi mcp search theme"
          CHANGED=$(git diff --name-only HEAD~1)
          RUN=false
          for dir in $PERF_DIRS; do
            if echo "$CHANGED" | grep -q "^${dir}/"; then
              RUN=true
              break
            fi
          done
          echo "run_perf=$RUN" >> $GITHUB_OUTPUT

      - name: Trigger CircleCI performance pipeline
        if: steps.check.outputs.run_perf == 'true'
        run: |
          curl -s -X POST \
            "https://circleci.com/api/v2/project/gh/aimeos/pagible/pipeline" \
            -H "Circle-Token: $CCI_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "master", "parameters": {"run_perf": true}}'
        env:
          CCI_TOKEN: ${{ secrets.CCI_TOKEN }}
