name: Split Packages
on:
  push:
    branches: [master, '*.x']
    tags: ['[0-9]*.[0-9]*.[0-9]*']

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, admin, ai, graphql, import, search, jsonapi, mcp, theme]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and push
        id: split
        uses: claudiodekker/splitsh-action@v1
        with:
          prefix: ${{ matrix.package }}
          target_repo: aimeos/pagible-${{ matrix.package }}
          target_branch: ${{ github.ref_name }}

      - name: Push tag to split repo
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git remote add split https://x-access-token:${{ secrets.SPLIT_TOKEN }}@github.com/aimeos/pagible-${{ matrix.package }}.git
          git fetch split master
          git tag -f "$TAG" split/master
          git push split "$TAG" --force
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
