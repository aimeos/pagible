name: Split Packages
on:
  push:
    branches: [master, '*.x']
    tags: ['[0-9]*.[0-9]*.[0-9]*']

env:
  GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: core, repo: pagible-core }
          - { package: admin, repo: pagible-admin }
          - { package: ai, repo: pagible-ai }
          - { package: backup, repo: pagible-backup }
          - { package: graphql, repo: pagible-graphql }
          - { package: import, repo: pagible-import }
          - { package: search, repo: pagible-search }
          - { package: jsonapi, repo: pagible-jsonapi }
          - { package: mcp, repo: pagible-mcp }
          - { package: theme, repo: pagible-theme }
          - { package: cashier, repo: pagible-cashier }
          - { package: themes/paper, repo: pagible-themes-paper }
    steps:
      - uses: actions/checkout@v5

      - name: Seed empty repo
        run: |
          REPO="https://${GITHUB_TOKEN}@github.com/aimeos/${{ matrix.repo }}.git"
          DIR=$(mktemp -d)
          git clone -- "$REPO" "$DIR" 2>&1 || true
          cd "$DIR"
          if ! git rev-parse HEAD >/dev/null 2>&1; then
            git checkout -b ${{ github.ref_name }}
            git config user.name "aimeos"
            git config user.email "aimeos@aimeos.org"
            git commit --allow-empty -m "Initial commit"
            git push -u origin ${{ github.ref_name }}
          fi
          rm -rf "$DIR"

      - name: Split and push branch
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: danharrin/monorepo-split-github-action@v2.4.4
        with:
          branch: ${{ github.ref_name }}
          package_directory: ${{ matrix.package }}
          repository_organization: 'aimeos'
          repository_name: ${{ matrix.repo }}
          user_name: 'aimeos'
          user_email: 'aimeos@aimeos.org'

      - name: Split and push tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: danharrin/monorepo-split-github-action@v2.4.4
        with:
          branch: master
          tag: ${{ github.ref_name }}
          package_directory: ${{ matrix.package }}
          repository_organization: 'aimeos'
          repository_name: ${{ matrix.repo }}
          user_name: 'aimeos'
          user_email: 'aimeos@aimeos.org'
