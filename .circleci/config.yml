  "php85-phpstan":
    docker:
      - image: aimeos/ci-php:8.5
    steps:
      - checkout
      - restore_cache:
          keys:
            - php85-{{ checksum "composer.json" }}
      - run: composer update -n --prefer-dist
      - save_cache:
          key: php85-{{ checksum "composer.json" }}
          paths: [./vendor]
      - run: ./vendor/bin/phpstan --no-progress

  "admin-lint":
    docker:
      - image: cimg/node:lts
    working_directory: ~/project/admin/app
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - admin-{{ checksum "package-lock.json" }}
      - run: npm ci --cache ~/.npm
      - save_cache:
          key: admin-{{ checksum "package-lock.json" }}
          paths:
            - ./.npm
      - run: npx eslint

  "admin-unit":
    docker:
      - image: cypress/browsers:latest
    working_directory: ~/project/admin/app
    parallelism: 3
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - admin-{{ checksum "package-lock.json" }}
      - run: npm ci --cache ~/.npm
      - save_cache:
          key: admin-{{ checksum "package-lock.json" }}
          paths:
            - ./.npm
            - ~/.cache/Cypress
      - run:
          name: Run component tests
          command: |
            case $CIRCLE_NODE_INDEX in
              0) SPECS="tests/fields/**/*.cy.{js,ts}" ;;
              1) SPECS="tests/components/**/*.cy.{js,ts}" ;;
              2) SPECS="tests/*.cy.{js,ts},tests/js/**/*.cy.{js,ts},tests/views/**/*.cy.{js,ts}" ;;
            esac
            npx cypress run --component --spec "$SPECS"

  "admin-e2e":
    docker:
      - image: cypress/browsers:latest
    working_directory: ~/project/admin/app
    parallelism: 4
    steps:
      - checkout:
          path: ~/project
      - restore_cache:
          keys:
            - admin-{{ checksum "package-lock.json" }}
      - run: npm ci --cache ~/.npm
      - save_cache:
          key: admin-{{ checksum "package-lock.json" }}
          paths:
            - ./.npm
            - ~/.cache/Cypress
      - run: npm run build
      - run: npx start-server-and-test preview http://localhost:4173 \
          "npx cypress run --spec $(circleci tests glob 'cypress/e2e/**/*.cy.{js,ts}' | circleci tests split --split-by=timings | tr '\n' ',')"
      - store_artifacts:
          path: cypress

  "perf-sqlite":
