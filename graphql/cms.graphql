"Can be used as an argument to upload files using https://github.com/jaydenseric/graphql-multipart-request-spec"
scalar Upload @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\Upload")

"JSON data type for JSON strings with arbitrary data"
scalar JSON @scalar(class: "MLL\\GraphQLScalars\\JSON")

enum Publish {
  SCHEDULED
  PUBLISHED
  DRAFT
}

union RemoveableUpload = Upload | Boolean

extend type User {
    "CMS editor capabilities"
    permission: JSON! @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@permission")

    "CMS named roles assigned to the user"
    roles: [String!]! @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@roles")

    "CMS user preferences"
    settings: JSON @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@settings")
}

extend type Query {
  "Current authenticated user"
  me: User @auth

  "Get page by ID"
  page(id: ID! @eq): Page
    @guard @cmsPermission(action: "page:view")
    @softDeletes
    @find

  "Get the available pages"
  pages(filter: PageFilter, sort: _ @orderBy(columns: ["id", "name", "title", "editor", "_lft"]), publish: Publish): [Page!]
    @paginate(builder: "\\Aimeos\\Cms\\GraphQL\\Query@pages", defaultCount: 100)
    @guard @cmsPermission(action: "page:view")
    @orderBy(column: "_lft", direction: ASC)
    @softDeletes

  "Get element item by ID"
  element(id: ID! @eq): Element
    @guard @cmsPermission(action: "element:view")
    @softDeletes
    @find

  "Get available element items"
  elements(filter: ElementFilter, sort: _ @orderBy(columns: ["id", "lang", "name", "type", "editor"]), publish: Publish): [Element!]
    @paginate(builder: "\\Aimeos\\Cms\\GraphQL\\Query@elements", defaultCount: 100)
    @guard @cmsPermission(action: "element:view")
    @orderBy(column: "id", direction: DESC)
    @softDeletes

  "Get file item by ID"
  file(id: ID! @eq): File
    @guard @cmsPermission(action: "file:view")
    @softDeletes
    @find

  "Get available files"
  files(filter: FileFilter, sort: _ @orderBy(columns: ["id", "name", "mime", "lang", "editor", "byversions_count"]), publish: Publish): [File!]
    @paginate(builder: "\\Aimeos\\Cms\\GraphQL\\Query@files", defaultCount: 100)
    @guard @cmsPermission(action: "file:view")
    @orderBy(column: "id", direction: DESC)
    @softDeletes
}

extend type Mutation {
  "Authenticated user"
  cmsLogin(email: String!, password: String!): User!

  "Log out authenticated user"
  cmsLogout: User @guard

  "Update CMS user preferences"
  cmsUser(settings: JSON!): User @guard

  "Summarize the content of the file passed by its file ID"
  describe(file: String!, lang: String): String @guard @cmsPermission(action: "file:describe") @throttle(maxAttempts: 10)

  "Remove the part of the image covered by the mask (black: keep, white: erase), returns a base64 encoded image"
  erase(file: Upload!, mask: Upload!): String @guard @cmsPermission(action: "image:erase") @throttle(maxAttempts: 10)

  "Generate images from prompts and passed file IDs, returns a base64 encoded image"
  imagine(prompt: String!, context: String, files: [String!]): String @guard @cmsPermission(action: "image:imagine") @throttle(maxAttempts: 10)

  "Edit an image using a mask image and a prompt, returns a base64 encoded image"
  inpaint(file: Upload!, mask: Upload!, prompt: String!): String @guard @cmsPermission(action: "image:inpaint") @throttle(maxAttempts: 10)

  "Remove image background, returns a base64 encoded image"
  isolate(file: Upload!): String @guard @cmsPermission(action: "image:isolate") @throttle(maxAttempts: 10)

  "Get page metrics for the last X days"
  metrics(url: String!, days: Int, lang: String): Stats @guard @cmsPermission(action: "page:metrics") @throttle(maxAttempts: 10)

  "Edit an image using a prompt, returns a base64 encoded image"
  repaint(file: Upload!, prompt: String!): String @guard @cmsPermission(action: "image:repaint") @throttle(maxAttempts: 10)

  "Refine existing page content"
  refine(prompt: String!, content: JSON!, type: String, context: String): JSON @guard @cmsPermission(action: "page:refine") @throttle(maxAttempts: 10)

  "Synthesize pages and content from prompts and passed file IDs"
  synthesize(prompt: String!, context: String, files: [String!]): String @guard @cmsPermission(action: "page:synthesize") @throttle(maxAttempts: 10)

  "Transcribe uploaded audio file"
  transcribe(file: Upload!): JSON @guard @cmsPermission(action: "audio:transcribe") @throttle(maxAttempts: 10)

  "Translate texts"
  translate(texts: [String!]!, to: String!, from: String, context: String): [String!]! @guard @cmsPermission(action: "text:translate") @throttle(maxAttempts: 10)

  "Extend/outpaint image, returns a base64 encoded image"
  uncrop(file: Upload!, top: Int!, right: Int, bottom: Int, left: Int): String @guard @cmsPermission(action: "image:uncrop") @throttle(maxAttempts: 10)

  "Upscale image, returns a base64 encoded image"
  upscale(file: Upload!, factor: Int!): String @guard @cmsPermission(action: "image:upscale") @throttle(maxAttempts: 10)

  "Generate texts from prompts and passed file IDs"
  write(prompt: String!, context: String, files: [String!]): String @guard @cmsPermission(action: "text:write") @throttle(maxAttempts: 10)


  "Add a new page below the page referenced by 'parent' and before the page referenced by 'ref' (or append if NULL)"
  addPage(input: PageInput!, parent: ID, ref: ID, elements: [ID!], files: [ID!]): Page
    @guard @cmsPermission(action: "page:add")

  "Move the page below the page referenced by 'parent' and before the page referenced by 'ref' (or append if NULL)"
  movePage(id: ID!, parent: ID, ref: ID): Page
    @guard @cmsPermission(action: "page:move")

  "Update the values of an existing page"
  savePage(id: ID!, input: PageInput!, elements: [ID!], files: [ID!]): Page
    @guard @cmsPermission(action: "page:save")

  "Delete an existing page"
  dropPage(id: [ID!]!): [Page]!
    @guard @cmsPermission(action: "page:drop")

  "Restore an existing page"
  keepPage(id: [ID!]!): [Page]!
    @guard @cmsPermission(action: "page:keep")

  "Purge an existing page"
  purgePage(id: [ID!]!): [Page]!
    @guard @cmsPermission(action: "page:purge")

  "Publish page data"
  pubPage(id: [ID!]!, at: DateTime): [Page]!
    @guard @cmsPermission(action: "page:publish")


  "Add a new shared content element with file references"
  addElement(input: ElementInput!, files: [ID!]): Element
    @guard @cmsPermission(action: "element:add")

  "Update an existing shared content element"
  saveElement(id: ID!, input: ElementInput!, files: [ID!]): Element
    @guard @cmsPermission(action: "element:save")

  "Delete an existing shared content element"
  dropElement(id: [ID!]!): [Element]!
    @guard @cmsPermission(action: "element:drop")

  "Restore an existing shared content element"
  keepElement(id: [ID!]!): [Element]!
    @guard @cmsPermission(action: "element:keep")

  "Purge an existing shared content element"
  purgeElement(id: [ID!]!): [Element]!
    @guard @cmsPermission(action: "element:purge")

  "Publish an existing shared content element"
  pubElement(id: [ID!]!, at: DateTime): [Element]!
    @guard @cmsPermission(action: "element:publish")


  "Adds a new file upload, optionally with preview and the description of the file"
  addFile(input: FileInput, file: Upload, preview: Upload): File
    @guard @cmsPermission(action: "file:add")

  "Update an existing file"
  saveFile(id: ID!, input: FileInput!, file: Upload, preview: RemoveableUpload): File
    @guard @cmsPermission(action: "file:save")

  "Delete an existing file"
  dropFile(id: [ID!]!): [File]!
    @guard @cmsPermission(action: "file:drop")

  "Restore an existing file"
  keepFile(id: [ID!]!): [File]!
    @guard @cmsPermission(action: "file:keep")

  "Purge an existing file"
  purgeFile(id: [ID!]!): [File]!
    @guard @cmsPermission(action: "file:purge")

  "Publish file data"
  pubFile(id: [ID!]!, at: DateTime): [File]!
    @guard @cmsPermission(action: "file:publish")
}

type Page {
  "Unique page ID"
  id: ID!

  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ID of the parent page or NULL if it's a root page"
  parent_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String!

  "Unique URL segment of the page"
  path: String

  "Domain name the root page (!) is responsible for"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Arbitrary header data"
  meta: JSON!

  "Arbitrary configuration settings"
  config: JSON!

  "List of content"
  content: JSON!

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int!

  "Cache lifetime in minutes"
  cache: Int!

  "Name of the last user who added, updated or deleted the page"
  editor: String!

  "Date/time value when the page was created"
  created_at: String!

  "Date/time value when the page was last modified"
  updated_at: String!

  "Date/time value when the page was deleted or NULL if it's available"
  deleted_at: String

  "If node has children"
  has: Boolean!

  "Relation to the parent page or NULL if it's a root page"
  parent: Page

  "Relation to the children of the current page"
  children: [Page!]! @hasMany(type: PAGINATOR)

  "Relation to the ancestors of the current page up to the root page"
  ancestors: [Page!]!

  "List of shared content elements assigned to the page"
  elements: [Element!]! @belongsToMany

  "List of files assigned to the page"
  files: [File!]! @belongsToMany

  "Latest version of the page meta data"
  latest: Version @belongsTo

  "Published version of the page meta data"
  published: Version @morphOne

  "List of versions for the page meta data"
  versions: [Version!]! @morphMany
}

input PageFilter {
  "Unique page IDs"
  id: [ID!]

  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ID of the parent page or NULL if it's a root page"
  parent_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Unique URL segment of the page"
  path: String

  "Domain name the root page (!) is responsible for"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Arbitrary header data"
  meta: String

  "Arbitrary configuration settings"
  config: String

  "List of content"
  content: String

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int

  "Cache lifetime in minutes"
  cache: Int

  "Name of the last user who added, updated or deleted the page"
  editor: String

  "Search for this string in any text field"
  any: String
}

input PageInput {
  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Unique URL segment of the page"
  path: String

  "Domain name the page is assigned to"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Arbitrary page header"
  meta: JSON

  "Arbitrary configuration settings"
  config: JSON

  "List of content"
  content: JSON

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int

  "Cache lifetime in minutes"
  cache: Int
}

type Element {
  "Unique element ID"
  id: ID!

  "Type of the content element"
  type: String!

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the content element"
  name: String

  "Arbitrary content element"
  data: JSON!

  "Name of the last user who added, updated or deleted the content element"
  editor: String!

  "Date/time value when the content element was created"
  created_at: String!

  "Date/time value when the content element was last modified"
  updated_at: String!

  "Date/time value when the content element was deleted or NULL if it's available"
  deleted_at: String

  "List of pages using the content element"
  bypages: [Page!]! @belongsToMany

  "List of versions using the content element"
  byversions: [Version!]! @belongsToMany

  "List of files assigned to the content element"
  files: [File!]! @belongsToMany

  "Latest version of the content element"
  latest: Version @belongsTo

  "Published version of the content element"
  published: Version @morphOne

  "List of versioned data for the content element"
  versions: [Version!]! @morphMany
}

input ElementFilter {
  "Unique element IDs"
  id: [ID!]

  "Type of the content elements"
  type: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the content elements"
  name: String

  "Arbitrary content elements"
  data: String

  "Name of the last user who added, updated or deleted the content elements"
  editor: String

  "Search for this string in any text field"
  any: String
}

input ElementInput {
  "Type of the content element"
  type: String!

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the element"
  name: String

  "Arbitrary content element data"
  data: JSON!
}

type File {
  "Unique ID of the stored file"
  id: ID!

  "Mime type of the stored file"
  mime: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the file"
  name: String

  "Description of the file in different languages with ISO language code as key"
  description: JSON

  "Transcribtion of the file content in different languages with ISO language code as key"
  transcription: JSON

  "Relative path to the stored file"
  path: String!

  "Preview images of the stored file if any"
  previews: JSON!

  "Name of the last user who added, updated or deleted the file"
  editor: String!

  "Date/time value when the file was created"
  created_at: String!

  "Date/time value when the file was last modified"
  updated_at: String!

  "Date/time value when the file was deleted or NULL if it's available"
  deleted_at: String

  "List of elements using the file"
  byelements: [Element!]! @belongsToMany

  "List of pages using the file"
  bypages: [Page!]! @belongsToMany

  "List of versions using the file"
  byversions: [Version!]! @belongsToMany

  "Number of versions referencing the file"
  byversions_count: Int!

  "Latest version of the file"
  latest: Version @belongsTo

  "Published version of the content element"
  published: Version @morphOne

  "List of versioned data for the file"
  versions: [Version!]! @morphMany
}

input FileFilter {
  "IDs of the stored files"
  id: [ID!]

  "Mime type of the stored files"
  mime: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the stored files"
  name: String

  "Name of the last user who added, updated or deleted the files"
  editor: String

  "Search for this string in any text field"
  any: String
}

input FileInput {
  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the stored file"
  name: String

  "URL or relative path within the storage of the file"
  path: String

  "Preview images of the stored file if any"
  previews: JSON

  "Description of the file in different languages with ISO language code as key"
  description: JSON

  "Transcribtion of the file content in different languages with ISO language code as key"
  transcription: JSON
}

type Version {
  "Unique version ID"
  id: ID!

  "ID of the page or element"
  versionable_id: ID!

  "Model class name of the versioned item"
  versionable_type: String!

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary versioned data"
  data: JSON!

  "Arbitrary versioned page config, content and meta data"
  aux: JSON

  "List of shared content elements assigned to the version"
  elements: [Element!]! @belongsToMany

  "List of files used in the data or content property"
  files: [File!]

  "If versioned is currently published or not"
  published: Boolean!

  "ISO date when the version should be published"
  publish_at: String

  "Name of the last user who added, updated or deleted the versioned data"
  editor: String!

  "Date/time value when the versioned data was created"
  created_at: String!
}

type Stats {
  "List of errors occurred"
  errors: [String!]

  "Number of page views by day"
  views: [StatsNumber!]

  "Number of page visits by day"
  visits: [StatsNumber!]

  "Number of conversions on page by day"
  conversions: [StatsNumber!]

  "Average page visit duration in seconds by day"
  durations: [StatsNumber!]

  "Number of page visits by countries"
  countries: [StatsNumber!]

  "Number of page visits by referring website"
  referrers: [StatsNumber!]

  "Page Speed related values for the page"
  pagespeed: [StatsNumber!]

  "Number of Google search impressions"
  impressions: [StatsNumber!]

  "Number of Google search clicks"
  clicks: [StatsNumber!]

  "Click-throgh rate in Google search results"
  ctrs: [StatsNumber!]

  "Google search queries with stats"
  queries: [StatsQuery!]
}

type StatsNumber {
  "Date in ISO format (YYYY-MM-DD) or string"
  key: String!

  "Number of page views or visits"
  value: Float

  "List of individual rows"
  rows: [StatsNumber!]
}

type StatsQuery {
  "Query string"
  key: String!

  "Number of page impressions in Google Search results"
  impressions: Int

  "Number of page clicks in  Google Search results"
  clicks: Int

  "Click through rate in  Google Search (between 0 and 1)"
  ctr: Float

  "Position in Google Search results"
  position: Float
}
