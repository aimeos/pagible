"Can be used as an argument to upload files using https://github.com/jaydenseric/graphql-multipart-request-spec"
scalar Upload @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\Upload")

"JSON data type for JSON strings with arbitrary data"
scalar JSON @scalar(class: "MLL\\GraphQLScalars\\JSON")

enum Publish {
  SCHEDULED
  PUBLISHED
  DRAFT
}

enum Trashed {
  WITHOUT @enum(value: "without")
  WITH @enum(value: "with")
  ONLY @enum(value: "only")
}

union RemoveableUpload = Upload | Boolean

type CmsUser {
    "Unique user ID"
    id: ID!

    "User name"
    name: String!

    "User email address"
    email: String!

    "CMS editor capabilities"
    permission: JSON! @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@permission")

    "CMS named roles assigned to the user"
    roles: [String!]! @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@roles")

    "CMS user preferences"
    settings: JSON @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\UserResolver@settings")
}

extend type Query {
  "Current authenticated user"
  me: CmsUser @auth @throttle(name: "cms-graphql")

  "Get the available access values"
  access: [String!]!
    @guard @cmsPermission(action: "access:view") @throttle(name: "cms-graphql")
    @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Query@access")

  "Get page by ID"
  page(id: ID! @eq): Page
    @guard @cmsPermission(action: "page:view") @throttle(name: "cms-graphql")
    @softDeletes
    @find

  "Get the available pages"
  pages(filter: PageFilter, sort: _ @orderBy(columns: ["id", "name", "title", "editor", "_lft"]), publish: Publish, trashed: Trashed): [Page!]
    @paginate(resolver: "\\Aimeos\\Cms\\GraphQL\\Query@pages", defaultCount: 100)
    @guard @cmsPermission(action: "page:view") @throttle(name: "cms-graphql")

  "Get element item by ID"
  element(id: ID! @eq): Element
    @guard @cmsPermission(action: "element:view") @throttle(name: "cms-graphql")
    @softDeletes
    @find

  "Get available element items"
  elements(filter: ElementFilter, sort: _ @orderBy(columns: ["id", "lang", "name", "type", "editor"]), publish: Publish, trashed: Trashed): [Element!]
    @paginate(resolver: "\\Aimeos\\Cms\\GraphQL\\Query@elements", defaultCount: 100)
    @guard @cmsPermission(action: "element:view") @throttle(name: "cms-graphql")

  "Get file item by ID"
  file(id: ID! @eq): File
    @guard @cmsPermission(action: "file:view") @throttle(name: "cms-graphql")
    @softDeletes
    @find

  "Get available files"
  files(filter: FileFilter, sort: _ @orderBy(columns: ["id", "name", "mime", "lang", "editor", "byversions_count"]), publish: Publish, trashed: Trashed): [File!]
    @paginate(resolver: "\\Aimeos\\Cms\\GraphQL\\Query@files", defaultCount: 100)
    @guard @cmsPermission(action: "file:view") @throttle(name: "cms-graphql")
}

extend type Mutation {
  "Authenticated user"
  cmsLogin(email: String!, password: String!): User! @throttle(name: "cms-login")

  "Log out authenticated user"
  cmsLogout: User @guard

  "Update CMS user preferences"
  cmsUser(settings: JSON!): User @guard @throttle(name: "cms-graphql")

  "Add an access value"
  addAccess(value: String!): [String!]!
    @guard @cmsPermission(action: "access:add") @throttle(name: "cms-graphql")

  "Delete access values"
  deleteAccess(values: [String!]!): [String!]!
    @guard @cmsPermission(action: "access:delete") @throttle(name: "cms-graphql")

  "Add a new page below the page referenced by 'parent' and before the page referenced by 'ref' (or append if NULL)"
  addPage(input: PageInput!, parent: ID, ref: ID): Page
    @guard @cmsPermission(action: "page:add") @throttle(name: "cms-graphql")

  "Move the page below the page referenced by 'parent' and before the page referenced by 'ref' (or append if NULL)"
  movePage(id: ID!, parent: ID, ref: ID): Page
    @guard @cmsPermission(action: ["page:move", "page:view"]) @throttle(name: "cms-graphql")

  "Update the values of an existing page"
  savePage(id: ID!, input: PageInput!, latestId: ID): Page
    @guard @cmsPermission(action: ["page:save", "page:view"]) @throttle(name: "cms-graphql")

  "Immediately replace the frontend access rules for pages; NULL makes them public and an empty list requires authentication"
  setPageAccess(
    id: [ID!]! @rulesForArray(apply: ["max:1000"])
    access: [String!] @rulesForArray(apply: ["nullable", "max:250"])
    descendants: Boolean = false
  ): Int!
    @guard @cmsPermission(action: "page:publish") @throttle(name: "cms-graphql")

  "Apply the same values to several existing pages at once, optionally including all sub-pages; returns the ids saved"
  bulkPage(id: [ID!]! @rulesForArray(apply: ["max:1000"]), input: PageInput!, descendants: Boolean = false): BulkResult!
    @guard @cmsPermission(action: ["page:save", "page:view"]) @throttle(name: "cms-graphql")

  "Delete an existing page"
  dropPage(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Page]!
    @guard @cmsPermission(action: ["page:drop", "page:view"]) @throttle(name: "cms-graphql")

  "Restore an existing page"
  keepPage(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Page]!
    @guard @cmsPermission(action: ["page:keep", "page:view"]) @throttle(name: "cms-graphql")

  "Purge an existing page"
  purgePage(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Page]!
    @guard @cmsPermission(action: ["page:purge", "page:view"]) @throttle(name: "cms-graphql")

  "Publish page data"
  pubPage(id: [ID!]! @rulesForArray(apply: ["max:1000"]), at: DateTime): [Page]!
    @guard @cmsPermission(action: ["page:publish", "page:view"]) @throttle(name: "cms-graphql")


  "Add a new shared content element"
  addElement(input: ElementInput!): Element
    @guard @cmsPermission(action: "element:add") @throttle(name: "cms-graphql")

  "Update an existing shared content element"
  saveElement(id: ID!, input: ElementInput!, latestId: ID): Element
    @guard @cmsPermission(action: ["element:save", "element:view"]) @throttle(name: "cms-graphql")

  "Apply the same values to several existing shared content elements at once; returns the ids saved"
  bulkElement(id: [ID!]! @rulesForArray(apply: ["max:1000"]), input: ElementInput!): BulkResult!
    @guard @cmsPermission(action: ["element:save", "element:view"]) @throttle(name: "cms-graphql")

  "Delete an existing shared content element"
  dropElement(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Element]!
    @guard @cmsPermission(action: ["element:drop", "element:view"]) @throttle(name: "cms-graphql")

  "Restore an existing shared content element"
  keepElement(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Element]!
    @guard @cmsPermission(action: ["element:keep", "element:view"]) @throttle(name: "cms-graphql")

  "Purge an existing shared content element"
  purgeElement(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [Element]!
    @guard @cmsPermission(action: ["element:purge", "element:view"]) @throttle(name: "cms-graphql")

  "Publish an existing shared content element"
  pubElement(id: [ID!]! @rulesForArray(apply: ["max:1000"]), at: DateTime): [Element]!
    @guard @cmsPermission(action: ["element:publish", "element:view"]) @throttle(name: "cms-graphql")


  "Adds a new file upload, optionally with preview and the description of the file"
  addFile(input: FileInput, file: Upload, preview: Upload): File
    @guard @cmsPermission(action: "file:add") @throttle(name: "cms-graphql")

  "Update an existing file"
  saveFile(id: ID!, input: FileInput!, file: Upload, preview: RemoveableUpload, latestId: ID): File
    @guard @cmsPermission(action: ["file:save", "file:view"]) @throttle(name: "cms-graphql")

  "Apply the same values to several existing files at once; returns the ids saved"
  bulkFile(id: [ID!]! @rulesForArray(apply: ["max:1000"]), input: FileInput!): BulkResult!
    @guard @cmsPermission(action: ["file:save", "file:view"]) @throttle(name: "cms-graphql")

  "Delete an existing file"
  dropFile(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [File]!
    @guard @cmsPermission(action: ["file:drop", "file:view"]) @throttle(name: "cms-graphql")

  "Restore an existing file"
  keepFile(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [File]!
    @guard @cmsPermission(action: ["file:keep", "file:view"]) @throttle(name: "cms-graphql")

  "Purge an existing file"
  purgeFile(id: [ID!]! @rulesForArray(apply: ["max:1000"])): [File]!
    @guard @cmsPermission(action: ["file:purge", "file:view"]) @throttle(name: "cms-graphql")

  "Publish file data"
  pubFile(id: [ID!]! @rulesForArray(apply: ["max:1000"]), at: DateTime): [File]!
    @guard @cmsPermission(action: ["file:publish", "file:view"]) @throttle(name: "cms-graphql")

  "Get page metrics for the last X days"
  metrics(url: String!, days: Int, lang: String): Stats @guard @cmsPermission(action: "page:metrics") @throttle(name: "cms-graphql")
}

type BulkResult {
  "IDs of the items that were successfully updated"
  ids: [ID!]!

  "Map of updated item id to its new latest version id"
  latest: JSON!

  "Field values applied to every updated item"
  data: JSON!

  "Number of attempted items that could not be saved"
  failed: Int!
}

type Stats {
  "List of errors occurred"
  errors: [String!]

  "Number of page views by day"
  views: [StatsNumber!]

  "Number of page visits by day"
  visits: [StatsNumber!]

  "Number of conversions on page by day"
  conversions: [StatsNumber!]

  "Average page visit duration in seconds by day"
  durations: [StatsNumber!]

  "Number of page visits by countries"
  countries: [StatsNumber!]

  "Number of page visits by referring website"
  referrers: [StatsNumber!]

  "Page Speed related values for the page"
  pagespeed: [StatsNumber!]

  "Number of Google search impressions"
  impressions: [StatsNumber!]

  "Number of Google search clicks"
  clicks: [StatsNumber!]

  "Google search click through rate by day"
  ctrs: [StatsNumber!]

  "List of search queries"
  queries: [StatsQuery!]
}

type StatsNumber {
  "Date in ISO format (YYYY-MM-DD) or string"
  key: String!

  "Number of page views or visits"
  value: Float

  "List of individual rows"
  rows: [StatsNumber!]
}

type StatsQuery {
  "Query string"
  key: String!

  "Number of page impressions in Google Search results"
  impressions: Int

  "Number of page clicks in  Google Search results"
  clicks: Int

  "Click through rate in  Google Search (between 0 and 1)"
  ctr: Float

  "Position in Google Search results"
  position: Float
}

type Page {
  "Unique page ID"
  id: ID!

  "Immediate frontend access rules: NULL is public, an empty list requires authentication, otherwise any listed value grants access"
  access: [String!]
    @cmsPermission(action: "access:view")
    @with(relation: "access")
    @method(name: "accessValues")

  "Whether the page has immediate frontend access rules"
  restricted: Boolean!
    @withCount(relation: "access")
    @method(name: "restricted")

  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ID of the parent page or NULL if it's a root page"
  parent_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String!

  "Unique URL segment of the page"
  path: String

  "Domain name the root page (!) is responsible for"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Meta entries keyed by type in {type, data, files} form"
  meta: JSON!

  "Configuration entries keyed by type in {type, data, files} form"
  config: JSON!

  "List of content"
  content: JSON!

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int!

  "Cache lifetime in minutes"
  cache: Int!

  "Name of the last user who added, updated or deleted the page"
  editor: String!

  "Date/time value when the page was created"
  created_at: String!

  "Date/time value when the page was last modified"
  updated_at: String!

  "Date/time value when the page was deleted or NULL if it's available"
  deleted_at: String

  "Number of descendant pages below this node (0 if it has no children)"
  has: Int!

  "Relation to the parent page or NULL if it's a root page"
  parent: Page

  "Relation to the children of the current page"
  children: [Page!]! @hasMany(type: PAGINATOR)

  "Relation to the ancestors of the current page up to the root page"
  ancestors: [Page!]!

  "List of shared content elements assigned to the page"
  elements: [Element!]! @belongsToMany @cmsPermission(action: "element:view")

  "List of files assigned to the page"
  files: [File!]! @belongsToMany @cmsPermission(action: "file:view")

  "Latest version of the page meta data"
  latest: Version @belongsTo

  "List of versions for the page meta data"
  versions: [Version!]! @morphMany

  "Change and conflict info when concurrent edit was detected, null otherwise"
  changed: JSON
}

input PageFilter {
  "Unique page IDs"
  id: [ID!] @rulesForArray(apply: ["nullable", "max:1000"])

  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ID of the parent page or NULL if it's a root page"
  parent_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Unique URL segment of the page"
  path: String

  "Domain name the root page (!) is responsible for"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Arbitrary header data"
  meta: String

  "Arbitrary configuration settings"
  config: String

  "List of content"
  content: String

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int

  "Cache lifetime in minutes"
  cache: Int

  "Name of the last user who added, updated or deleted the page"
  editor: String

  "Search for this string in any text field"
  any: String
}

input PageInput {
  "Translation ID of all pages with the same content in different languages"
  related_id: ID

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Unique URL segment of the page"
  path: String

  "Domain name the page is assigned to"
  domain: String

  "Short page name for menus"
  name: String

  "Descriptive page title"
  title: String

  "If not empty, the path or URL the browser is redirected to"
  to: String

  "Tag name to identify a page, e.g. for the starting point of a navigation structure"
  tag: String

  "Theme name assigned to the page"
  theme: String

  "Type of the page for using different theme templates"
  type: String

  "Canonical meta entries keyed by type; each entry requires type, data and files"
  meta: JSON

  "Canonical configuration entries keyed by type; each entry requires type, data and files"
  config: JSON

  "List of content"
  content: JSON

  "Visibility status of the page, 0=inactive, 1=visible, 2=hidden in navigation"
  status: Int

  "Cache lifetime in minutes"
  cache: Int
}

type Element {
  "Unique element ID"
  id: ID!

  "Type of the content element"
  type: String!

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the content element"
  name: String

  "Arbitrary content element"
  data: JSON!

  "Name of the last user who added, updated or deleted the content element"
  editor: String!

  "Date/time value when the content element was created"
  created_at: String!

  "Date/time value when the content element was last modified"
  updated_at: String!

  "Date/time value when the content element was deleted or NULL if it's available"
  deleted_at: String

  "List of pages using the content element"
  bypages: [Page!]! @belongsToMany @cmsPermission(action: "page:view")

  "List of versions using the content element"
  byversions: [Version!]! @belongsToMany @cmsPermission(action: "page:view")

  "List of files assigned to the content element"
  files: [File!]! @belongsToMany @cmsPermission(action: "file:view")

  "Latest version of the content element"
  latest: Version @belongsTo

  "List of versioned data for the content element"
  versions: [Version!]! @morphMany

  "Change and conflict info when concurrent edit was detected, null otherwise"
  changed: JSON
}

input ElementFilter {
  "Unique element IDs"
  id: [ID!] @rulesForArray(apply: ["nullable", "max:1000"])

  "Type of the content elements"
  type: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the content elements"
  name: String

  "Arbitrary content elements"
  data: String

  "Name of the last user who added, updated or deleted the content elements"
  editor: String

  "Search for this string in any text field"
  any: String
}

input ElementInput {
  "Type of the content element (required when creating an element)"
  type: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary string which describes the element"
  name: String

  "Arbitrary content element data (required when creating an element)"
  data: JSON
}

type File {
  "Unique ID of the stored file"
  id: ID!

  "Mime type of the stored file"
  mime: String

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the file"
  name: String

  "Description of the file in different languages with ISO language code as key"
  description: JSON

  "Transcribtion of the file content in different languages with ISO language code as key"
  transcription: JSON

  "Relative path to the stored file"
  path: String!

  "Preview images of the stored file if any"
  previews: JSON!

  "Name of the last user who added, updated or deleted the file"
  editor: String!

  "Date/time value when the file was created"
  created_at: String!

  "Date/time value when the file was last modified"
  updated_at: String!

  "Date/time value when the file was deleted or NULL if it's available"
  deleted_at: String

  "List of elements using the file"
  byelements: [Element!]! @belongsToMany @cmsPermission(action: "element:view")

  "List of pages using the file"
  bypages: [Page!]! @belongsToMany @cmsPermission(action: "page:view")

  "List of versions using the file"
  byversions: [Version!]! @belongsToMany @cmsPermission(action: ["page:view", "element:view"])

  "Number of versions referencing the file"
  byversions_count: Int!

  "Latest version of the file"
  latest: Version @belongsTo @cmsSelect(
    key: "id"
    columns: ["versionable_id", "versionable_type", "lang", "data", "aux", "published", "publish_at", "editor", "created_at"]
  )

  "List of versioned data for the file"
  versions: [Version!]! @morphMany

  "Change and conflict info when concurrent edit was detected, null otherwise"
  changed: JSON
}

input FileFilter {
  "IDs of the stored files"
  id: [ID!] @rulesForArray(apply: ["nullable", "max:1000"])

  "Mime types of the stored files"
  mime: [String!] @rulesForArray(apply: ["nullable", "max:1000"])

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the stored files"
  name: String

  "Name of the last user who added, updated or deleted the files"
  editor: String

  "Search for this string in any text field"
  any: String
}

input FileInput {
  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Descriptive name of the stored file"
  name: String

  "URL or relative path within the storage of the file"
  path: String

  "Preview images of the stored file if any"
  previews: JSON

  "Description of the file in different languages with ISO language code as key"
  description: JSON

  "Transcribtion of the file content in different languages with ISO language code as key"
  transcription: JSON
}

type Version {
  "Unique version ID"
  id: ID!

  "ID of the page or element"
  versionable_id: ID!

  "Model class name of the versioned item"
  versionable_type: String!

  "ISO language code, e.g. 'en', 'en-GB' or empty for default language"
  lang: String

  "Arbitrary versioned data"
  data: JSON!

  "Auxiliary page config/content/meta or file description/transcription data"
  aux: JSON

  "List of shared content elements assigned to the version"
  elements: [Element!]! @belongsToMany @cmsPermission(action: "element:view")

  "List of files used in the data or content property"
  files: [File!] @cmsPermission(action: "file:view")

  "If versioned is currently published or not"
  published: Boolean!

  "ISO date when the version should be published"
  publish_at: String

  "Name of the last user who added, updated or deleted the versioned data"
  editor: String!

  "Date/time value when the versioned data was created"
  created_at: String!
}

"Theme schema definition"
type Schema {
  "Theme identifier"
  name: String!

  "Human-readable theme label"
  label: String!

  "Available page types and their sections"
  types: JSON

  "Content element definitions"
  content: JSON

  "Meta element definitions"
  meta: JSON

  "Config element definitions"
  config: JSON
}

extend type Query {
  "Get all registered theme schemas"
  schemas: [Schema!]!
    @field(resolver: "\\Aimeos\\Cms\\GraphQL\\Resolvers\\SchemaResolver@schemas")
    @guard @throttle(name: "cms-graphql")
}
